services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: armory:latest
    container_name: armory
    restart: unless-stopped
    expose:
      - "${PORT:-8088}"
    volumes:
      - ./data:/app/data
      - ./projectdocs.db:/app/projectdocs.db
    env_file:
      - .env
    networks:
      - armory-net

  collabora:
    image: collabora/code:latest
    container_name: armory-collabora
    restart: unless-stopped
    expose:
      - "9980"
    environment:
      - domain=${COLLABORA_DOMAIN:-armory\.team-73\.ru}|app
      - extra_params=--o:ssl.enable=false --o:ssl.termination=true --o:wopi.host[@allow]=armory --o:net.service_root=/collabora
      - dictionaries=ru_RU en_US
      - username=${COLLABORA_ADMIN_USER:-admin}
      - password=${COLLABORA_ADMIN_PASSWORD:-changeme}
    cap_add:
      - MKNOD
    networks:
      - armory-net

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:0.39.6
    container_name: armory-pocketbase
    restart: unless-stopped
    expose:
      - "8090"
    volumes:
      - ./data/pb_data:/pb/pb_data
      - ./data/pb_migrations:/pb/pb_migrations
    # Автоматически создаём/обновляем администратора при старте и явно указываем папку данных.
    entrypoint: ["/bin/sh"]
    command:
      - "-c"
      - 'pocketbase superuser upsert "$$POCKETBASE_ADMIN_EMAIL" "$$POCKETBASE_ADMIN_PASSWORD" --dir=/pb/pb_data --migrationsDir=/pb/pb_migrations && exec pocketbase serve --http=0.0.0.0:8090 --dir=/pb/pb_data --migrationsDir=/pb/pb_migrations'
    env_file:
      - .env
    networks:
      - armory-net

networks:
  armory-net:
