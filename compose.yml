services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: armory:latest
    container_name: armory
    restart: unless-stopped
    expose:
      - "${PORT:-8088}"
    volumes:
      - ./data:/app/data
      - ./projectdocs.db:/app/projectdocs.db
    env_file:
      - .env
    networks:
      - armory-net

networks:
  armory-net:
