services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: armory:latest
    container_name: armory
    restart: unless-stopped
    expose:
      - "${PORT:-8088}"
    volumes:
      - ./data:/app/data
      - ./armory.db:/app/armory.db
    env_file:
      - .env
    networks:
      - armory-net

  pocketbase:
    image: alpine:3.20
    container_name: armory-pocketbase
    restart: unless-stopped
    working_dir: /pb
    env_file:
      - .env
    environment:
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL:-admin@example.com}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD:-changeme}
    command: >
      sh -c '/pb/pocketbase superuser upsert "$POCKETBASE_ADMIN_EMAIL" "$POCKETBASE_ADMIN_PASSWORD" --dir=/pb/pb_data &&
             /pb/pocketbase serve --http=0.0.0.0:8090 --dir=/pb/pb_data'
    expose:
      - "8090"
    volumes:
      - ./pocketbase/pocketbase:/pb/pocketbase:ro
      - ./data/pb_data:/pb/pb_data
    networks:
      - armory-net

  collabora:
    image: collabora/code:latest
    container_name: armory-collabora
    restart: unless-stopped
    expose:
      - "9980"
    environment:
      - domain=${COLLABORA_DOMAIN:-armory\.team-73\.ru}|app
      - extra_params=--o:ssl.enable=false --o:ssl.termination=true --o:wopi.host[@allow]=armory --o:net.service_root=/collabora --o:welcome.enable=false
      - dictionaries=ru_RU en_US
      - username=${COLLABORA_ADMIN_USER:-admin}
      - password=${COLLABORA_ADMIN_PASSWORD:-changeme}
    cap_add:
      - MKNOD
    networks:
      - armory-net

networks:
  armory-net:
