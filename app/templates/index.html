{% extends "base.html" %}

{% block content %}
<!-- Планировщик задач -->
<div class="scheduler-section mb-4">
    <div class="scheduler-card">
        <h3 class="scheduler-title"><i class="bi bi-clock-history me-2"></i>Планировщик задач</h3>
        <div class="scheduler-body">
            <div class="scheduler-form-row">
                <div class="scheduler-form-group scheduler-form-group-half">
                    <label class="form-label" for="project-select">Выберите проект:</label>
                    <select id="project-select" class="form-select">
                        <option value="" disabled selected>-- Выберите проект --</option>
                        <option value="Dogma">Dogma</option>
                        <option value="TrendAgent">TrendAgent</option>
                    </select>
                </div>
                <div class="scheduler-form-group scheduler-form-group-half">
                    <label class="form-label" for="datetime">Дата и время выполнения:</label>
                    <input type="datetime-local" id="datetime" class="form-control">
                </div>
            </div>
            <div class="scheduler-btn-row">
                <button id="schedule-btn" class="scheduler-btn scheduler-btn-green">
                    <i class="bi bi-calendar-check me-1"></i> Запланировать
                </button>
            </div>
            <div id="status-message" class="scheduler-status"></div>
            <div class="task-queue-group">
                <label class="form-label"><i class="bi bi-list-task me-1"></i> Очередь запланированных задач:</label>
                <pre id="atq-output" class="atq-output">Загрузка...</pre>
                <div class="scheduler-btn-row">
                    <button id="refresh-atq" class="scheduler-btn scheduler-btn-brown">
                        <i class="bi bi-arrow-clockwise me-1"></i> Обновить
                    </button>
                </div>
                <div class="scheduler-form-group mt-3">
                    <label class="form-label" for="task-id">ID задачи для удаления:</label>
                    <input type="text" id="task-id" class="form-control" placeholder="Введите ID задачи">
                </div>
                <div class="scheduler-btn-row">
                    <button id="remove-btn" class="scheduler-btn scheduler-btn-red">
                        <i class="bi bi-trash me-1"></i> Удалить задачу
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Проекты</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#projectModal">
        <i class="bi bi-plus-lg me-1"></i> Новый проект
    </button>
</div>

<div id="projects-list" class="row g-4">
    <div class="text-center text-muted py-5">Загрузка проектов...</div>
</div>

<!-- Modal -->
<div class="modal fade" id="projectModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Новый проект</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="project-form">
                    <div class="mb-3">
                        <label class="form-label">Название</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <textarea class="form-control" name="description" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" onclick="createProject()">Создать</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        loadProjects().then(() => {
            initScheduler();
            fillSchedulerProjects();
        });
        loadSidebars();
    });
</script>
{% endblock %}
