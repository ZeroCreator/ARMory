{% extends "base_project.html" %}

{% block content %}
<div class="mb-3">
    <a href="/" class="text-decoration-none"><i class="bi bi-arrow-left"></i> Все проекты</a>
</div>

<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="mb-0"><i class="bi bi-kanban"></i> Общий канбан</h2>
        <p class="text-muted mb-0">Все задачи по всем проектам</p>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-outline-brown" onclick="openStatusModal()">
            <i class="bi bi-plus-lg me-1"></i> Колонка
        </button>
        <button class="btn btn-success" onclick="openTaskModal()">
            <i class="bi bi-plus-lg me-1"></i> Задача
        </button>
        <button class="btn btn-outline-secondary" onclick="exportKanban()" title="Экспортировать канбан">
            <i class="bi bi-download"></i>
        </button>
        <button class="btn btn-outline-secondary" onclick="document.getElementById('kanban-import-input').click()" title="Импортировать канбан">
            <i class="bi bi-upload"></i>
        </button>
        <input type="file" id="kanban-import-input" accept=".json" style="display:none" onchange="importKanban(this)">
    </div>
</div>

<!-- Фильтры -->
<div id="kanban-filters" class="card mb-4 border-0 shadow-sm">
    <div class="card-body">
        <div class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="form-label">Проект</label>
                <select class="form-select" id="filter-project" onchange="applyFilters()">
                    <option value="">Все проекты</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Приоритет</label>
                <select class="form-select" id="filter-priority" onchange="applyFilters()">
                    <option value="">Все</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Ответственный</label>
                <select class="form-select" id="filter-assignee" onchange="applyFilters()">
                    <option value="">Все</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Тег</label>
                <select class="form-select" id="filter-tag" onchange="applyFilters()">
                    <option value="">Все</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Дедлайн</label>
                <input type="date" class="form-control" id="filter-due-before" onchange="applyFilters()">
            </div>
        </div>
        <div class="row g-3 mt-1">
            <div class="col-md-3">
                <label class="form-label">Создано с</label>
                <input type="date" class="form-control" id="filter-created-after" onchange="applyFilters()">
            </div>
            <div class="col-md-3">
                <label class="form-label">Создано до</label>
                <input type="date" class="form-control" id="filter-created-before" onchange="applyFilters()">
            </div>
            <div class="col-md-2 offset-md-4">
                <label class="form-label">&nbsp;</label>
                <button class="btn btn-outline-gray w-100" onclick="resetFilters()" title="Сбросить фильтры">
                    <i class="bi bi-x-lg"></i> Сбросить
                </button>
            </div>
        </div>
    </div>
</div>

<div id="kanban-board" class="kanban-board">
    <div class="text-center text-muted py-5"><div class="spinner-border"></div></div>
</div>

<!-- Модал задачи -->
<div class="modal fade" id="taskModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="task-modal-title">Новая задача</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="task-form">
                    <input type="hidden" name="task_id" id="task-id">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Проект <span class="text-danger">*</span></label>
                            <select class="form-select" name="project_id" id="task-project-id" required onchange="onTaskProjectChange()">
                                <option value="">Выберите проект</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Статус (колонка) <span class="text-danger">*</span></label>
                            <select class="form-select" name="status_id" id="task-status-id" required>
                                <option value="">Выберите статус</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Название <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="title" required placeholder="Название задачи">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <textarea class="form-control" name="description" rows="3" placeholder="Описание..."></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Приоритет</label>
                            <select class="form-select" name="priority">
                                <option value="low">Низкий</option>
                                <option value="medium" selected>Средний</option>
                                <option value="high">Высокий</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Дедлайн</label>
                            <input type="datetime-local" class="form-control" name="due_date">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Ответственный (email)</label>
                            <input type="email" class="form-control" name="assignee_email" placeholder="user@example.com">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Теги (через запятую)</label>
                        <input type="text" class="form-control" name="tags" placeholder="backend, urgent">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger me-auto" id="task-delete-btn" onclick="deleteTaskFromModal()" style="display:none;">Удалить</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" onclick="saveTask()">Сохранить</button>
            </div>
        </div>
    </div>
</div>

<!-- Модал колонки -->
<div class="modal fade" id="statusModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="status-modal-title">Новая колонка</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="status-form">
                    <input type="hidden" name="status_id" id="status-id">
                    <div class="mb-3">
                        <label class="form-label">Проект <span class="text-danger">*</span></label>
                        <select class="form-select" name="project_id" id="status-project-id" required>
                            <option value="">Выберите проект</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Название <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="name" required placeholder="Например: На review">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Цвет</label>
                        <input type="color" class="form-control form-control-color" name="color" value="#a78bfa">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger me-auto" id="status-delete-btn" onclick="deleteStatusFromModal()" style="display:none;">Удалить</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" onclick="saveStatus()">Сохранить</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="/static/js/kanban_global.js?v=18"></script>
{% endblock %}
