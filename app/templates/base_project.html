{% extends "base.html" %}

{% block main_class %}container py-4{% endblock %}

{% block left_sidebar %}{% endblock %}
{% block right_sidebar %}{% endblock %}

{% block extra_js %}
<!-- Контекстное меню файлов проекта -->
<div id="project-item-context-menu" class="sidebar-context-menu" style="display:none;">
    <div class="project-item-context-item" data-action="copy-link"><i class="bi bi-link-45deg"></i> Копировать ссылку на файл</div>
    <div class="sidebar-context-divider"></div>

    <div class="project-item-context-item" data-action="download"><i class="bi bi-download"></i> Скачать файл</div>
    <div class="sidebar-context-divider"></div>
    <div class="project-item-context-item" data-action="edit"><i class="bi bi-pencil"></i> Изменить</div>
    <div class="project-item-context-item text-danger" data-action="delete"><i class="bi bi-trash"></i> Удалить</div>
