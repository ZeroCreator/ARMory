<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title }}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/style.css?v=32">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="/">
                <span class="navbar-brand-icon me-2">
                    <i class="bi bi-folder-fill"></i>
                    <span class="navbar-brand-letter">A</span>
                </span>
                {{ title }}
            </a>
            <div class="header-nav mx-auto">
                <a href="/alexandrite" class="header-nav-link">Alexandrite</a>
                <a href="/glossary" class="header-nav-link">Глоссарий</a>
                <a href="/docs/" class="header-nav-link" target="_blank" rel="noopener">Документация</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-muted py-3 mt-auto">
        <small>ARMory &copy; 2026 · Shkola Olga (<a href="https://github.com/ZeroCreator" target="_blank" rel="noopener" class="footer-github-link">ZeroCreator <i class="bi bi-github"></i></a>)</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/app.js?v=41"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
